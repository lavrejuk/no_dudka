<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Трекер привычек</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #000000;
            --hint: #999999;
            --button: #3390ec;
            --button-text: #ffffff;
            --secondary-bg: #f0f0f0;
            --danger: #e53935;
            --success: #4caf50;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1e1e1e;
                --text: #ffffff;
                --hint: #aaaaaa;
                --secondary-bg: #2c2c2c;
                --danger: #ef5350;
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 16px;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            transition: background 0.3s, color 0.3s;
        }

        /* ======= АНИМАЦИИ ======= */
        .screen {
            display: none;
            width: 100%;
            max-width: 400px;
            text-align: center;
            padding: 20px 0;
            opacity: 0;
            transform: translateY(15px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .screen.active {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        button:active {
            transform: scale(0.95);
            transition: transform 0.1s ease;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .timer-pulse {
            animation: pulse 1s infinite;
        }

        @keyframes pop {
            0% { transform: scale(0.5); opacity: 0; }
            70% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .money-pop {
            animation: pop 0.4s ease;
        }
        /* ======================== */

        h2 {
            font-size: 24px;
            margin-bottom: 8px;
        }

        p {
            font-size: 16px;
            margin-bottom: 16px;
            color: var(--hint);
        }

        button {
            background: var(--button);
            color: var(--button-text);
            border: none;
            padding: 14px 20px;
            border-radius: 12px;
            font-size: 16px;
            margin: 6px 0;
            cursor: pointer;
            width: 100%;
            max-width: 320px;
            transition: opacity 0.2s;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        button:active {
            opacity: 0.8;
        }

        button.danger {
            background: var(--danger);
        }

        button.outline {
            background: transparent;
            border: 2px solid var(--button);
            color: var(--button);
        }

        input, select {
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--hint);
            background: var(--secondary-bg);
            color: var(--text);
            width: 100%;
            max-width: 320px;
            margin: 8px 0;
            font-size: 16px;
        }

        label {
            display: block;
            text-align: left;
            max-width: 320px;
            margin: 12px auto 4px;
            font-size: 14px;
            color: var(--hint);
        }

        .timer {
            font-size: 2.8em;
            font-weight: bold;
            margin: 20px 0;
            word-break: break-all;
            font-variant-numeric: tabular-nums;
            font-family: 'SF Mono', 'Courier New', monospace;
            transition: color 0.3s ease;
        }

        .saved {
            font-size: 1.4em;
            color: var(--success);
            margin: 10px 0 20px;
            font-weight: bold;
        }

        .habit-name {
            font-size: 1.1em;
            color: var(--hint);
            margin-bottom: 16px;
        }

        .icon {
            font-size: 64px;
            display: block;
            margin-bottom: 16px;
        }

        .divider {
            width: 60px;
            height: 3px;
            background: var(--button);
            border-radius: 2px;
            margin: 20px auto;
        }

        small {
            display: block;
            color: var(--hint);
            font-size: 12px;
            margin: 4px 0 8px;
        }
    </style>
</head>
<body>

    <!-- ЭКРАН 0: Ввод имени (Только при первом входе) -->
    <div id="screen-name" class="screen">
        <span class="icon">👋</span>
        <h2>Привет, куряга, как тебя зовут?</h2>
        <p>Введи своё имя, чтобы я мог к тебе обращаться</p>
        <input type="text" id="name-input" placeholder="Введи имя..." maxlength="20" autocomplete="off">
        <button onclick="saveName()">✅ Продолжить</button>
    </div>

    <!-- ЭКРАН 1: Выбор привычки (Главный экран) -->
    <div id="screen-welcome" class="screen active">
        <span class="icon">🔥</span>
        <h2 id="welcome-title">Привет!</h2>
        <p>Выбери привычку, от которой хочешь отказаться:</p>
        <button onclick="selectHabit('cigarettes')">🚬 Сигареты</button>
        <button onclick="selectHabit('vape')">💨 Вейп</button>
        <div class="divider"></div>
        <button class="outline" onclick="showCustomInput()">✏️ Своя привычка</button>
        <div id="custom-block" style="display:none;">
            <input type="text" id="custom-input" placeholder="Введи свою привычку" maxlength="30">
            <button onclick="confirmCustom()">Далее</button>
        </div>
        <div class="divider"></div>
        <!-- Кнопка настроек для смены имени -->
        <button class="outline" style="border-color: var(--hint); color: var(--hint);" onclick="showSettings()">⚙️ Настройки (сменить имя)</button>
    </div>

    <!-- ЭКРАН 2: Настройка даты/времени и стоимости -->
    <div id="screen-setup" class="screen">
        <span class="icon">⚙️</span>
        <h2>Настройка</h2>
        <p id="habit-label"></p>
        
        <label>Когда было последний раз?</label>
        <input type="datetime-local" id="last-use-datetime">
        
        <div id="cost-block" style="display:none;">
            <label>Стоимость пачки / жижи (₽):</label>
            <input type="number" id="cost-input" placeholder="Например 200" min="0" step="1">
            <small>Считаем по 1 пачке в день</small>
        </div>
        
        <button onclick="startTracking()">🚀 Начать отсчёт</button>
        <button class="outline" style="border-color: var(--hint); color: var(--hint); margin-top: 10px;" onclick="goToWelcome()">← Назад</button>
    </div>

    <!-- ЭКРАН 3: Основной экран трекинга -->
    <div id="screen-tracker" class="screen">
        <span class="icon">💪</span>
        <h2>Ты держишься!</h2>
        <p class="habit-name" id="display-habit"></p>
        <div class="timer" id="timer">0д 0ч 0м 0с</div>
        <div class="saved" id="money-saved"></div>
        <button onclick="resetAll()">🔄 Сбросить и начать заново</button>
    </div>

    <!-- ЭКРАН 4: Настройки (Смена имени) -->
    <div id="screen-settings" class="screen">
        <span class="icon">⚙️</span>
        <h2>Сменить имя</h2>
        <p>Введи новое имя, как я должен к тебе обращаться</p>
        <input type="text" id="settings-name-input" placeholder="Новое имя..." maxlength="20" autocomplete="off">
        <button onclick="saveSettingsName()">💾 Сохранить</button>
        <button class="outline" style="border-color: var(--hint); color: var(--hint); margin-top: 10px;" onclick="goToWelcome()">← Назад</button>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        // ============ Инициализация Telegram ============
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
            document.documentElement.style.setProperty('--bg', tg.backgroundColor || '#ffffff');
            document.documentElement.style.setProperty('--text', tg.textColor || '#000000');
            document.documentElement.style.setProperty('--button', tg.buttonColor || '#3390ec');
            document.documentElement.style.setProperty('--button-text', tg.buttonTextColor || '#ffffff');
            document.documentElement.style.setProperty('--hint', tg.hintColor || '#999999');
            document.documentElement.style.setProperty('--secondary-bg', tg.secondaryBackgroundColor || '#f0f0f0');
        }

        // ============ DOM элементы ============
        const nameInput = document.getElementById('name-input');
        const settingsNameInput = document.getElementById('settings-name-input');
        const screens = {
            name: document.getElementById('screen-name'),
            welcome: document.getElementById('screen-welcome'),
            setup: document.getElementById('screen-setup'),
            tracker: document.getElementById('screen-tracker'),
            settings: document.getElementById('screen-settings')
        };
        const welcomeTitle = document.getElementById('welcome-title');
        const customBlock = document.getElementById('custom-block');
        const customInput = document.getElementById('custom-input');
        const habitLabel = document.getElementById('habit-label');
        const lastUseDatetime = document.getElementById('last-use-datetime');
        const costBlock = document.getElementById('cost-block');
        const costInput = document.getElementById('cost-input');
        const displayHabit = document.getElementById('display-habit');
        const timerEl = document.getElementById('timer');
        const moneySavedEl = document.getElementById('money-saved');

        let currentHabit = null;
        let timerInterval = null;
        let userName = "Друг";

        // ============ Функции ============
        function showScreen(name) {
            Object.values(screens).forEach(s => s.classList.remove('active'));
            screens[name].classList.add('active');
        }

        // Сохранить имя при первом запуске
        function saveName() {
            const val = nameInput.value.trim();
            if (!val) return alert('Пожалуйста, введи своё имя!');
            
            userName = val;
            localStorage.setItem('my_username', userName); // Запоминаем имя
            welcomeTitle.textContent = 'Привет, ' + userName + '!';
            showScreen('welcome');
            customBlock.style.display = 'none'; // Скрыть инпут привычки, если открыт
        }

        // Перейти в настройки
        function showSettings() {
            settingsNameInput.value = localStorage.getItem('my_username') || 'Друг';
            showScreen('settings');
        }

        // Сохранить новое имя из настроек
        function saveSettingsName() {
            const val = settingsNameInput.value.trim();
            if (!val) return alert('Имя не может быть пустым!');
            
            localStorage.setItem('my_username', val);
            userName = val;
            welcomeTitle.textContent = 'Привет, ' + userName + '!';
            alert('Имя успешно изменено!');
            goToWelcome();
        }

        // Вернуться на главную
        function goToWelcome() {
            showScreen('welcome');
            customBlock.style.display = 'none';
        }

        function getHabitName(type) {
            const names = { cigarettes: 'Сигареты', vape: 'Вейп' };
            return names[type] || type;
        }

        function getHabitIcon(type) {
            const icons = { cigarettes: '🚬', vape: '💨' };
            return icons[type] || '🎯';
        }

        function selectHabit(type) {
            currentHabit = { type: type, name: getHabitName(type), icon: getHabitIcon(type) };
            showSetupScreen();
        }

        function showCustomInput() {
            customBlock.style.display = 'block';
            customInput.focus();
        }

        function confirmCustom() {
            const val = customInput.value.trim();
            if (!val) return alert('Введи название привычки');
            currentHabit = { type: 'custom', name: val, icon: '🎯' };
            showSetupScreen();
        }

        function showSetupScreen() {
            habitLabel.textContent = 'Привычка: ' + currentHabit.icon + ' ' + currentHabit.name;
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            lastUseDatetime.value = now.toISOString().slice(0, 16);
            if (currentHabit.type === 'cigarettes' || currentHabit.type === 'vape') {
                costBlock.style.display = 'block';
                costInput.value = '';
            } else {
                costBlock.style.display = 'none';
            }
            showScreen('setup');
        }

        function startTracking() {
            const dtValue = lastUseDatetime.value;
            if (!dtValue) return alert('Укажи дату и время последнего использования');
            const startTime = new Date(dtValue).getTime();
            if (isNaN(startTime)) return alert('Неверная дата/время');
            if (startTime > Date.now()) return alert('Дата не может быть в будущем!');
            const cost = (costBlock.style.display !== 'none') ? parseFloat(costInput.value) || 0 : 0;
            currentHabit.startTime = startTime;
            currentHabit.costPerDay = cost;
            localStorage.setItem('habitData', JSON.stringify(currentHabit));
            displayHabit.textContent = currentHabit.icon + ' ' + currentHabit.name;
            showScreen('tracker');
            if (timerInterval) clearInterval(timerInterval);
            updateTimer();
            timerInterval = setInterval(updateTimer, 1000);
        }

        function updateTimer() {
            const now = Date.now();
            const diff = Math.max(0, now - currentHabit.startTime);
            const totalSeconds = Math.floor(diff / 1000);
            const days = Math.floor(totalSeconds / 86400);
            const hours = Math.floor((totalSeconds % 86400) / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;
            
            timerEl.textContent = days + 'д ' + hours + 'ч ' + minutes + 'м ' + seconds + 'с';
            timerEl.classList.add('timer-pulse');

            if (currentHabit.costPerDay > 0) {
                const daysPassed = diff / (1000 * 60 * 60 * 24);
                const saved = daysPassed * currentHabit.costPerDay;
                moneySavedEl.textContent = '💰 Сэкономлено: ' + Math.round(saved).toLocaleString('ru-RU') + ' ₽';
                moneySavedEl.classList.remove('money-pop');
                setTimeout(() => {
                    moneySavedEl.classList.add('money-pop');
                }, 10);
            } else {
                moneySavedEl.textContent = '';
            }
        }

        function resetAll() {
            if (confirm('Точно сбросить весь прогресс? Действие нельзя отменить.')) {
                if (timerInterval) clearInterval(timerInterval);
                localStorage.removeItem('habitData');
                currentHabit = null;
                goToWelcome();
                customBlock.style.display = 'none';
                customInput.value = '';
            }
        }

        // ============ Инициализация при загрузке ============
        const savedName = localStorage.getItem('my_username');
        const savedData = JSON.parse(localStorage.getItem('habitData') || 'null');

        if (savedName) {
            userName = savedName;
            welcomeTitle.textContent = 'Привет, ' + userName + '!';
            
            // Если есть сохраненный прогресс
            if (savedData && savedData.startTime) {
                currentHabit = savedData;
                displayHabit.textContent = (currentHabit.icon || '🎯') + ' ' + currentHabit.name;
                showScreen('tracker');
                updateTimer();
                timerInterval = setInterval(updateTimer, 1000);
            } else {
                // Просто показываем главное меню, минуя экран ввода имени
                showScreen('welcome');
                customBlock.style.display = 'none';
            }
        } else {
            // Если имя НЕ сохранено (первый запуск), показываем экран ввода
            showScreen('name');
            nameInput.focus();
        }
    </script>
</body>
</html>
