<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Трекер привычек v5</title>
    
    <!-- Запрет кэширования для авто-обновления -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <!-- Подключаем шрифт Montserrat -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #ffffff;
            --text: #000000;
            --hint: #999999;
            --button: #3390ec;
            --button-text: #ffffff;
            --secondary-bg: #f0f0f0;
            --danger: #e53935;
            --success: #4caf50;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1e1e1e;
                --text: #ffffff;
                --hint: #aaaaaa;
                --secondary-bg: #2c2c2c;
                --danger: #ef5350;
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 16px;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            transition: background 0.3s, color 0.3s;
        }

        .screen {
            display: none;
            width: 100%;
            max-width: 400px;
            text-align: center;
            padding: 20px 0;
        }

        .screen.active {
            display: block;
        }

        button:active {
            transform: scale(0.98);
        }

        h2 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        p {
            font-size: 16px;
            font-weight: 400;
            margin-bottom: 16px;
            color: var(--hint);
        }

        button {
            background: var(--button);
            color: var(--button-text);
            border: none;
            padding: 14px 20px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            margin: 6px 0;
            cursor: pointer;
            width: 100%;
            max-width: 320px;
            transition: opacity 0.2s;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        button:active {
            opacity: 0.8;
        }

        button.danger {
            background: var(--danger);
        }

        button.outline {
            background: transparent;
            border: 2px solid var(--button);
            color: var(--button);
        }

        input, select {
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--hint);
            background: var(--secondary-bg);
            color: var(--text);
            width: 100%;
            max-width: 320px;
            margin: 8px 0;
            font-size: 16px;
            font-family: 'Montserrat', sans-serif;
        }

        label {
            display: block;
            text-align: left;
            max-width: 320px;
            margin: 12px auto 4px;
            font-size: 14px;
            font-weight: 500;
            color: var(--hint);
        }

        .timer {
            font-size: 2.5em;
            font-weight: bold;
            margin: 10px 0;
            word-break: break-all;
            font-variant-numeric: tabular-nums;
        }

        .habit-name {
            font-size: 1.2em;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .icon {
            font-size: 48px;
            display: block;
            margin-bottom: 10px;
        }

        .divider {
            width: 60px;
            height: 3px;
            background: var(--button);
            border-radius: 2px;
            margin: 20px auto;
        }

        small {
            display: block;
            color: var(--hint);
            font-size: 12px;
            margin: 4px 0 8px;
        }

        /* Стили для карточек привычек в трекере */
        .habit-card {
            background: var(--secondary-bg);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
            width: 100%;
            max-width: 320px;
            position: relative;
        }

        .habit-card .timer {
            font-size: 2em;
        }

        /* Стили для списка в настройках */
        .settings-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--secondary-bg);
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 8px;
            width: 100%;
            max-width: 320px;
        }
        
        .settings-list-item .del-btn {
            background: var(--danger);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 6px 12px;
            font-size: 14px;
            cursor: pointer;
            width: auto;
            margin: 0;
        }
        
        .settings-list-item .del-btn:active {
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <!-- ЭКРАН 0: Ввод имени (Только при первом входе) -->
    <div id="screen-name" class="screen">
        <span class="icon">👋</span>
        <h2>Привет, куряга, как тебя зовут?</h2>
        <p>Введи своё имя, чтобы я мог к тебе обращаться</p>
        <input type="text" id="name-input" placeholder="Введи имя..." maxlength="20" autocomplete="off">
        <button onclick="saveName()">✅ Продолжить</button>
    </div>

    <!-- ЭКРАН 1: Выбор привычки (Главное меню) -->
    <div id="screen-welcome" class="screen active">
        <span class="icon">🔥</span>
        <h2 id="welcome-title">Привет!</h2>
        <p>Выбери привычку, от которой хочешь отказаться:</p>
        <button onclick="selectHabit('cigarettes')">🚬 Сигареты</button>
        <button onclick="selectHabit('vape')">💨 Вейп</button>
        <div class="divider"></div>
        <button class="outline" onclick="showCustomInput()">✏️ Своя привычка</button>
        <div id="custom-block" style="display:none;">
            <input type="text" id="custom-input" placeholder="Введи свою привычку" maxlength="30">
            <button onclick="confirmCustom()">Далее</button>
        </div>
    </div>

    <!-- ЭКРАН 2: Настройка новой привычки (Название, Дата, Время, Стоимость) -->
    <div id="screen-setup" class="screen">
        <span class="icon">⚙️</span>
        <h2>Добавление</h2>
        <p id="habit-label"></p>
        
        <label>Дата и время последнего использования:</label>
        <input type="datetime-local" id="last-use-datetime">
        
        <!-- Блок с расчетом стоимости -->
        <div id="cost-block" style="display:none;">
            <div id="cigarettes-cost-fields">
                <label>Сигарет в день (шт):</label>
                <input type="number" id="cig-per-day-input" placeholder="Например 10" min="0" step="1">
                
                <label>Стоимость одной пачки (₽):</label>
                <input type="number" id="cig-pack-cost-input" placeholder="Например 200" min="0" step="1">
            </div>

            <div id="vape-cost-fields" style="display:none;">
                <label>Сколько тратишь в месяц на вейп (₽):</label>
                <input type="number" id="vape-monthly-cost-input" placeholder="Например 2500" min="0" step="1">
            </div>
        </div>
        
        <button onclick="addNewHabitFromSetup()">🚀 Добавить и начать отсчёт</button>
        <button class="outline" style="border-color: var(--hint); color: var(--hint); margin-top: 10px;" onclick="goToWelcome()">← Назад к выбору</button>
    </div>

    <!-- ЭКРАН 3: Главный экран со списком таймеров -->
    <div id="screen-tracker" class="screen">
        <span class="icon">💪</span>
        <h2 id="tracker-title">Твои привычки</h2>
        <div id="habits-container"></div>
        
        <div class="divider"></div>
        <button class="outline" style="border-color: var(--hint); color: var(--hint);" onclick="showSettings()">⚙️ Настройки</button>
    </div>

    <!-- ЭКРАН 4: Настройки (Управление списком привычек + Добавление) -->
    <div id="screen-settings" class="screen">
        <span class="icon">⚙️</span>
        <h2>Настройки</h2>
        <p>Управление привычками</p>
        
        <input type="text" id="settings-custom-input" placeholder="Название новой привычки..." maxlength="30">
        <label style="margin-top: 8px;">Дата последнего использования:</label>
        <input type="datetime-local" id="settings-last-date-input">
        <button onclick="addNewHabitFromSettings()">➕ Добавить привычку</button>
        
        <div class="divider"></div>
        <h3 style="font-size: 18px; margin-top: 10px;">Список привычек</h3>
        <div id="settings-list-container"></div>

        <div class="divider"></div>
        <button class="outline" style="border-color: var(--hint); color: var(--hint); margin-top: 10px;" onclick="goToTracker()">← Назад к таймерам</button>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        // ============ Инициализация Telegram ============
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
            document.documentElement.style.setProperty('--bg', tg.backgroundColor || '#ffffff');
            document.documentElement.style.setProperty('--text', tg.textColor || '#000000');
            document.documentElement.style.setProperty('--button', tg.buttonColor || '#3390ec');
            document.documentElement.style.setProperty('--button-text', tg.buttonTextColor || '#ffffff');
            document.documentElement.style.setProperty('--hint', tg.hintColor || '#999999');
            document.documentElement.style.setProperty('--secondary-bg', tg.secondaryBackgroundColor || '#f0f0f0');
        }

        // ============ DOM элементы ============
        const nameInput = document.getElementById('name-input');
        const screens = {
            name: document.getElementById('screen-name'),
            welcome: document.getElementById('screen-welcome'),
            setup: document.getElementById('screen-setup'),
            tracker: document.getElementById('screen-tracker'),
            settings: document.getElementById('screen-settings')
        };
        const welcomeTitle = document.getElementById('welcome-title');
        const customBlock = document.getElementById('custom-block');
        const customInput = document.getElementById('custom-input');
        const habitLabel = document.getElementById('habit-label');
        const lastUseDatetime = document.getElementById('last-use-datetime');
        const costBlock = document.getElementById('cost-block');
        const cigPerDayInput = document.getElementById('cig-per-day-input');
        const cigPackCostInput = document.getElementById('cig-pack-cost-input');
        const vapeMonthlyCostInput = document.getElementById('vape-monthly-cost-input');
        const habitsContainer = document.getElementById('habits-container');
        const settingsCustomInput = document.getElementById('settings-custom-input');
        const settingsLastDateInput = document.getElementById('settings-last-date-input');
        const settingsListContainer = document.getElementById('settings-list-container');

        let habits = [];
        let timerInterval = null;
        let userName = "Друг";
        let currentSetupHabit = null;

        // ============ Функции управления экранами ============
        function showScreen(name) {
            Object.values(screens).forEach(s => s.classList.remove('active'));
            screens[name].classList.add('active');
        }

        function goToWelcome() {
            showScreen('welcome');
            customBlock.style.display = 'none';
        }

        function goToTracker() {
            renderHabits();
            updateAllTimers();
            showScreen('tracker');
        }

        // ============ Сохранение имени ============
        function saveName() {
            const val = nameInput.value.trim();
            if (!val) return alert('Пожалуйста, введи своё имя!');
            userName = val;
            localStorage.setItem('my_username', userName);
            welcomeTitle.textContent = 'Привет, ' + userName + '!';
            loadApp();
        }

        // ============ Логика привычек ============
        function setDefaultDateTime() {
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            lastUseDatetime.value = now.toISOString().slice(0, 16);
        }

        function selectHabit(type) {
            const names = { cigarettes: 'Сигареты', vape: 'Вейп' };
            const icons = { cigarettes: '🚬', vape: '💨' };
            
            currentSetupHabit = { 
                type: type, 
                name: names[type] || type, 
                icon: icons[type] || '🎯' 
            };
            habitLabel.textContent = 'Привычка: ' + currentSetupHabit.icon + ' ' + currentSetupHabit.name;
            
            // Показываем правильные поля для ввода стоимости
            if (currentSetupHabit.type === 'cigarettes') {
                costBlock.style.display = 'block';
                document.getElementById('cigarettes-cost-fields').style.display = 'block';
                document.getElementById('vape-cost-fields').style.display = 'none';
            } else if (currentSetupHabit.type === 'vape') {
                costBlock.style.display = 'block';
                document.getElementById('cigarettes-cost-fields').style.display = 'none';
                document.getElementById('vape-cost-fields').style.display = 'block';
            } else {
                costBlock.style.display = 'none';
            }

            showScreen('setup');
            setDefaultDateTime();
        }

        function showCustomInput() {
            customBlock.style.display = 'block';
            customInput.focus();
        }

        function confirmCustom() {
            const val = customInput.value.trim();
            if (!val) return alert('Введи название привычки');
            currentSetupHabit = { type: 'custom', name: val, icon: '🎯' };
            habitLabel.textContent = 'Привычка: ' + currentSetupHabit.icon + ' ' + currentSetupHabit.name;
            costBlock.style.display = 'none';
            showScreen('setup');
            setDefaultDateTime();
        }

        function addNewHabitFromSetup() {
            const dtValue = lastUseDatetime.value;
            if (!dtValue) return alert('Укажи дату и время последнего использования');
            const startTime = new Date(dtValue).getTime();
            if (isNaN(startTime)) return alert('Неверная дата/время');
            if (startTime > Date.now()) return alert('Дата не может быть в будущем!');

            let costPerDay = 0;
            if (currentSetupHabit.type === 'cigarettes') {
                const perDay = parseFloat(cigPerDayInput.value) || 0;
                const packCost = parseFloat(cigPackCostInput.value) || 0;
                costPerDay = (perDay / 20) * packCost;
            } else if (currentSetupHabit.type === 'vape') {
                const monthlyCost = parseFloat(vapeMonthlyCostInput.value) || 0;
                costPerDay = monthlyCost / 30;
            }

            const newHabit = {
                id: Date.now(),
                type: currentSetupHabit.type,
                name: currentSetupHabit.name,
                icon: currentSetupHabit.icon,
                startTime: startTime,
                costPerDay: costPerDay
            };

            habits.push(newHabit);
            saveHabits();
            goToTracker();
        }

        function showSettings() {
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            settingsLastDateInput.value = now.toISOString().slice(0, 16);
            settingsCustomInput.value = '';
            renderSettingsList();
            showScreen('settings');
        }

        function addNewHabitFromSettings() {
            const val = settingsCustomInput.value.trim();
            if (!val) return alert('Введи название привычки');

            const dtValue = settingsLastDateInput.value;
            if (!dtValue) return alert('Укажи дату и время последнего использования');
            const startTime = new Date(dtValue).getTime();
            if (isNaN(startTime)) return alert('Неверная дата/время');
            if (startTime > Date.now()) return alert('Дата не может быть в будущем!');

            const newHabit = {
                id: Date.now(),
                type: 'custom',
                name: val,
                icon: '🎯',
                startTime: startTime,
                costPerDay: 0
            };

            habits.push(newHabit);
            saveHabits();
            
            settingsCustomInput.value = '';
            renderSettingsList();
            alert('Привычка "' + val + '" добавлена! Переходи к таймерам.');
        }

        function deleteHabit(id) {
            if (confirm('Точно удалить эту привычку?')) {
                habits = habits.filter(h => h.id !== id);
                saveHabits();
                renderSettingsList();
                renderHabits();
                if (habits.length === 0) {
                    if (timerInterval) clearInterval(timerInterval);
                    timerInterval = null;
                }
            }
        }

        // ============ Логика отображения таймера (БЕЗ денег) ============
        function saveHabits() {
            localStorage.setItem('habitsData', JSON.stringify(habits));
        }

        function loadHabits() {
            const data = localStorage.getItem('habitsData');
            if (data) {
                habits = JSON.parse(data);
            } else {
                habits = [];
            }
        }

        function loadApp() {
            loadHabits();
            if (habits.length > 0) {
                goToTracker();
            } else {
                goToWelcome();
            }
        }

        function renderHabits() {
            if (habits.length === 0) {
                habitsContainer.innerHTML = `<p style="margin-top: 20px;">У тебя пока нет привычек. Добавь их в настройках!</p>`;
                return;
            }
            let html = '';
            habits.forEach(h => {
                const diff = Math.max(0, Date.now() - h.startTime);
                const totalSeconds = Math.floor(diff / 1000);
                const days = Math.floor(totalSeconds / 86400);
                const hours = Math.floor((totalSeconds % 86400) / 3600);
                const minutes = Math.floor((totalSeconds % 3600) / 60);
                const seconds = totalSeconds % 60;
                const timeStr = `${days}д ${hours}ч ${minutes}м ${seconds}с`;

                html += `
                    <div class="habit-card">
                        <div class="icon" style="font-size: 32px; margin-bottom: 5px;">${h.icon}</div>
                        <div class="habit-name">${h.name}</div>
                        <div class="timer" data-id="${h.id}">${timeStr}</div>
                    </div>
                `;
            });
            habitsContainer.innerHTML = html;
        }

        function renderSettingsList() {
            if (habits.length === 0) {
                settingsListContainer.innerHTML = `<p style="margin-top: 10px; font-size: 14px;">Список пуст.</p>`;
                return;
            }
            let html = '';
            habits.forEach(h => {
                html += `
                    <div class="settings-list-item">
                        <span>${h.icon} ${h.name}</span>
                        <button class="del-btn" onclick="deleteHabit(${h.id})">Удалить</button>
                    </div>
                `;
            });
            settingsListContainer.innerHTML = html;
        }

        function updateAllTimers() {
            if (habits.length === 0) return;
            
            habits.forEach(h => {
                const timerElement = document.querySelector(`.timer[data-id="${h.id}"]`);
                if (timerElement) {
                    const diff = Math.max(0, Date.now() - h.startTime);
                    const totalSeconds = Math.floor(diff / 1000);
                    const days = Math.floor(totalSeconds / 86400);
                    const hours = Math.floor((totalSeconds % 86400) / 3600);
                    const minutes = Math.floor((totalSeconds % 3600) / 60);
                    const seconds = totalSeconds % 60;
                    timerElement.textContent = `${days}д ${hours}ч ${minutes}м ${seconds}с`;
                }
            });
        }

        // ============ Запуск приложения ============
        const savedName = localStorage.getItem('my_username');
        if (savedName) {
            userName = savedName;
            welcomeTitle.textContent = 'Привет, ' + userName + '!';
            loadApp();
        } else {
            showScreen('name');
            nameInput.focus();
        }

        // Запускаем общий интервал для обновления всех таймеров раз в секунду
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if (screens.tracker.classList.contains('active')) {
                updateAllTimers();
            }
        }, 1000);
    </script>
</body>
</html>
