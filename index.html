<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Трекер привычек</title>
    <!-- Подключаем шрифт Montserrat -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #ffffff;
            --text: #000000;
            --hint: #999999;
            --button: #3390ec;
            --button-text: #ffffff;
            --secondary-bg: #f0f0f0;
            --danger: #e53935;
            --success: #4caf50;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1e1e1e;
                --text: #ffffff;
                --hint: #aaaaaa;
                --secondary-bg: #2c2c2c;
                --danger: #ef5350;
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            /* Применяем шрифт Montserrat */
            font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 16px;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            transition: background 0.3s, color 0.3s;
        }

        /* ======= БЕЗ АНИМАЦИЙ ======= */
        .screen {
            display: none;
            width: 100%;
            max-width: 400px;
            text-align: center;
            padding: 20px 0;
        }

        .screen.active {
            display: block;
        }

        button:active {
            /* Лёгкое сжатие при нажатии (можно убрать, если мешает) */
            transform: scale(0.98);
        }
        /* ============================ */

        h2 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        p {
            font-size: 16px;
            font-weight: 400;
            margin-bottom: 16px;
            color: var(--hint);
        }

        button {
            background: var(--button);
            color: var(--button-text);
            border: none;
            padding: 14px 20px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            margin: 6px 0;
            cursor: pointer;
            width: 100%;
            max-width: 320px;
            transition: opacity 0.2s;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        button:active {
            opacity: 0.8;
        }

        button.danger {
            background: var(--danger);
        }

        button.outline {
            background: transparent;
            border: 2px solid var(--button);
            color: var(--button);
        }

        input, select {
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--hint);
            background: var(--secondary-bg);
            color: var(--text);
            width: 100%;
            max-width: 320px;
            margin: 8px 0;
            font-size: 16px;
            font-family: 'Montserrat', sans-serif;
        }

        label {
            display: block;
            text-align: left;
            max-width: 320px;
            margin: 12px auto 4px;
            font-size: 14px;
            font-weight: 500;
            color: var(--hint);
        }

        .timer {
            font-size: 2.8em;
            font-weight: bold;
            margin: 20px 0;
            word-break: break-all;
            font-variant-numeric: tabular-nums;
        }

        .saved {
            font-size: 1.4em;
            color: var(--success);
            margin: 10px 0 20px;
            font-weight: bold;
        }

        .habit-name {
            font-size: 1.1em;
            color: var(--hint);
            margin-bottom: 16px;
        }

        .icon {
            font-size: 64px;
            display: block;
            margin-bottom: 16px;
        }

        .divider {
            width: 60px;
            height: 3px;
            background: var(--button);
            border-radius: 2px;
            margin: 20px auto;
        }

        small {
            display: block;
            color: var(--hint);
            font-size: 12px;
            margin: 4px 0 8px;
        }
    </style>
</head>
<body>

    <!-- ЭКРАН 0: Ввод имени (Только при первом входе) -->
    <div id="screen-name" class="screen">
        <span class="icon">👋</span>
        <h2>Привет, куряга, как тебя зовут?</h2>
        <p>Введи своё имя, чтобы я мог к тебе обращаться</p>
        <input type="text" id="name-input" placeholder="Введи имя..." maxlength="20" autocomplete="off">
        <button onclick="saveName()">✅ Продолжить</button>
    </div>

    <!-- ЭКРАН 1: Выбор привычки (Главный экран) -->
    <div id="screen-welcome" class="screen active">
        <span class="icon">🔥</span>
        <h2 id="welcome-title">Привет!</h2>
        <p>Выбери привычку, от которой хочешь отказаться:</p>
        <button onclick="selectHabit('cigarettes')">🚬 Сигареты</button>
        <button onclick="selectHabit('vape')">💨 Вейп</button>
        <div class="divider"></div>
        <button class="outline" onclick="showCustomInput()">✏️ Своя привычка</button>
        <div id="custom-block" style="display:none;">
            <input type="text" id="custom-input" placeholder="Введи свою привычку" maxlength="30">
            <button onclick="confirmCustom()">Далее</button>
        </div>
        <div class="divider"></div>
        <button class="outline" style="border-color: var(--hint); color: var(--hint);" onclick="showSettings()">⚙️ Настройки (сменить имя)</button>
    </div>

    <!-- ЭКРАН 2: Настройка даты/времени и стоимости -->
    <div id="screen-setup" class="screen">
        <span class="icon">⚙️</span>
        <h2>Настройка</h2>
        <p id="habit-label"></p>
        
        <label>Когда было последний раз?</label>
        <input type="datetime-local" id="last-use-datetime">
        
        <div id="cost-block" style="display:none;">
            <label>Сигарет в день (шт):</label>
            <input type="number" id="per-day-input" placeholder="Например 10" min="0" step="1">
            
            <label>Стоимость одной пачки (₽):</label>
            <input type="number" id="pack-cost-input" placeholder="Например 200" min="0" step="1">
        </div>
        
        <button onclick="startTracking()">🚀 Начать отсчёт</button>
        <button class="outline" style="border-color: var(--hint); color: var(--hint); margin-top: 10px;" onclick="goToWelcome()">← Назад</button>
    </div>

    <!-- ЭКРАН 3: Основной экран трекинга -->
    <div id="screen-tracker" class="screen">
        <span class="icon">💪</span>
        <h2>Ты держишься!</h2>
        <p class="habit-name" id="display-habit"></p>
        <div class="timer" id="timer">0д 0ч 0м 0с</div>
        <div class="saved" id="money-saved"></div>
        
        <button onclick="resetAll()">🔄 Сбросить и начать заново</button>
        <div class="divider"></div>
        <button class="outline" style="border-color: var(--hint); color: var(--hint); margin-top: 10px;" onclick="showSettings()">⚙️ Настройки (сменить имя)</button>
    </div>

    <!-- ЭКРАН 4: Настройки (Смена имени) -->
    <div id="screen-settings" class="screen">
        <span class="icon">⚙️</span>
        <h2>Сменить имя</h2>
        <p>Введи новое имя, как я должен к тебе обращаться</p>
        <input type="text" id="settings-name-input" placeholder="Введи новое имя..." maxlength="20" autocomplete="off">
        <button onclick="saveSettingsName()">💾 Сохранить</button>
        <button class="outline" style="border-color: var(--hint); color: var(--hint); margin-top: 10px;" onclick="goToWelcome()">← Назад</button>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        // ============ Инициализация Telegram ============
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
            document.documentElement.style.setProperty('--bg', tg.backgroundColor || '#ffffff');
            document.documentElement.style.setProperty('--text', tg.textColor || '#000000');
            document.documentElement.style.setProperty('--button', tg.buttonColor || '#3390ec');
            document.documentElement.style.setProperty('--button-text', tg.buttonTextColor || '#ffffff');
            document.documentElement.style.setProperty('--hint', tg.hintColor || '#999999');
            document.documentElement.style.setProperty('--secondary-bg', tg.secondaryBackgroundColor || '#f0f0f0');
        }

        // ============ DOM элементы ============
        const nameInput = document.getElementById('name-input');
        const settingsNameInput = document.getElementById('settings-name-input');
        const screens = {
            name: document.getElementById('screen-name'),
            welcome: document.getElementById('screen-welcome'),
            setup: document.getElementById('screen-setup'),
            tracker: document.getElementById('screen-tracker'),
            settings: document.getElementById('screen-settings')
        };
        const welcomeTitle = document.getElementById('welcome-title');
        const customBlock = document.getElementById('custom-block');
        const customInput = document.getElementById('custom-input');
        const habitLabel = document.getElementById('habit-label');
        const lastUseDatetime = document.getElementById('last-use-datetime');
        const costBlock = document.getElementById('cost-block');
        const perDayInput = document.getElementById('per-day-input');
        const packCostInput = document.getElementById('pack-cost-input');
        const displayHabit = document.getElementById('display-habit');
        const timerEl = document.getElementById('timer');
        const moneySavedEl = document.getElementById('money-saved');

        let currentHabit = null;
        let timerInterval = null;
        let userName = "Друг";

        // ============ Функции ============
        function showScreen(name) {
            Object.values(screens).forEach(s => s.classList.remove('active'));
            screens[name].classList.add('active');
        }

        // Сохранить имя при первом запуске
        function saveName() {
            const val = nameInput.value.trim();
            if (!val) return alert('Пожалуйста, введи своё имя!');
            
            userName = val;
            localStorage.setItem('my_username', userName);
            welcomeTitle.textContent = 'Привет, ' + userName + '!';
            showScreen('welcome');
            customBlock.style.display = 'none';
        }

        // Перейти в настройки (очищаем поле, чтобы убрать автозаполнение браузера на ПК)
        function showSettings() {
            settingsNameInput.value = '';
            settingsNameInput.placeholder = 'Введи новое имя...';
            setTimeout(() => settingsNameInput.focus(), 100);
            showScreen('settings');
        }

        // Сохранить новое имя из настроек
        function saveSettingsName() {
            const val = settingsNameInput.value.trim();
            if (!val) return alert('Имя не может быть пустым!');
            
            localStorage.setItem('my_username', val);
            userName = val;
            welcomeTitle.textContent = 'Привет, ' + userName + '!';
            alert('Имя успешно изменено на "' + val + '"!');
            goToWelcome();
        }

        // Вернуться на главную
        function goToWelcome() {
            showScreen('welcome');
            customBlock.style.display = 'none';
        }

        function getHabitName(type) {
            const names = { cigarettes: 'Сигареты', vape: 'Вейп' };
            return names[type] || type;
        }

        function getHabitIcon(type) {
            const icons = { cigarettes: '🚬', vape: '💨' };
            return icons[type] || '🎯';
        }

        function selectHabit(type) {
            currentHabit = { type: type, name: getHabitName(type), icon: getHabitIcon(type) };
            showSetupScreen();
        }

        function showCustomInput() {
            customBlock.style.display = 'block';
            customInput.focus();
        }

        function confirmCustom() {
            const val = customInput.value.trim();
            if (!val) return alert('Введи название привычки');
            currentHabit = { type: 'custom', name: val, icon: '🎯' };
            showSetupScreen();
        }

        function showSetupScreen() {
            habitLabel.textContent = 'Привычка: ' + currentHabit.icon + ' ' + currentHabit.name;
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            lastUseDatetime.value = now.toISOString().slice(0, 16);
            
            if (currentHabit.type === 'cigarettes') {
                costBlock.style.display = 'block';
                perDayInput.value = '';
                packCostInput.value = '';
            } else {
                costBlock.style.display = 'none';
            }
            showScreen('setup');
        }

        function startTracking() {
            const dtValue = lastUseDatetime.value;
            if (!dtValue) return alert('Укажи дату и время последнего использования');
            const startTime = new Date(dtValue).getTime();
            if (isNaN(startTime)) return alert('Неверная дата/время');
            if (startTime > Date.now()) return alert('Дата не может быть в будущем!');
            
            let costPerDay = 0;
            if (costBlock.style.display !== 'none') {
                const perDay = parseFloat(perDayInput.value) || 0;
                const packCost = parseFloat(packCostInput.value) || 0;
                // Математика: (сигарет в день / 20) * стоимость пачки
                costPerDay = (perDay / 20) * packCost;
            }
            
            currentHabit.startTime = startTime;
            currentHabit.costPerDay = costPerDay;
            localStorage.setItem('habitData', JSON.stringify(currentHabit));
            displayHabit.textContent = currentHabit.icon + ' ' + currentHabit.name;
            showScreen('tracker');
            if (timerInterval) clearInterval(timerInterval);
            updateTimer();
            timerInterval = setInterval(updateTimer, 1000);
        }

        function updateTimer() {
            const now = Date.now();
            const diff = Math.max(0, now - currentHabit.startTime);
            const totalSeconds = Math.floor(diff / 1000);
            const days = Math.floor(totalSeconds / 86400);
            const hours = Math.floor((totalSeconds % 86400) / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;
            
            timerEl.textContent = days + 'д ' + hours + 'ч ' + minutes + 'м ' + seconds + 'с';

            if (currentHabit.costPerDay > 0) {
                const daysPassed = diff / (1000 * 60 * 60 * 24);
                const saved = daysPassed * currentHabit.costPerDay;
                moneySavedEl.textContent = '💰 Сэкономлено: ' + Math.round(saved).toLocaleString('ru-RU') + ' ₽';
            } else {
                moneySavedEl.textContent = '';
            }
        }

        function resetAll() {
            if (confirm('Точно сбросить весь прогресс? Действие нельзя отменить.')) {
                if (timerInterval) clearInterval(timerInterval);
                localStorage.removeItem('habitData');
                currentHabit = null;
                goToWelcome();
                customBlock.style.display = 'none';
                customInput.value = '';
            }
        }

        // ============ Инициализация при загрузке ============
        const savedName = localStorage.getItem('my_username');
        const savedData = JSON.parse(localStorage.getItem('habitData') || 'null');

        if (savedName) {
            userName = savedName;
            welcomeTitle.textContent = 'Привет, ' + userName + '!';
            
            if (savedData && savedData.startTime) {
                currentHabit = savedData;
                displayHabit.textContent = (currentHabit.icon || '🎯') + ' ' + currentHabit.name;
                showScreen('tracker');
                updateTimer();
                timerInterval = setInterval(updateTimer, 1000);
            } else {
                showScreen('welcome');
                customBlock.style.display = 'none';
            }
        } else {
            showScreen('name');
            nameInput.focus();
        }
    </script>
</body>
</html>
