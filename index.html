<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Трекер привычек v9.5</title>
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #ffffff;
            --text: #000000;
            --hint: #999999;
            --button: #3390ec;
            --button-text: #ffffff;
            --secondary-bg: #f0f0f0;
            --danger: #e53935;
            --success: #4caf50;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1e1e1e;
                --text: #ffffff;
                --hint: #aaaaaa;
                --secondary-bg: #2c2c2c;
                --danger: #ef5350;
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 16px;
            margin: 0;
            min-height: 100vh;
            min-height: -webkit-fill-available;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            transition: background 0.3s, color 0.3s;
            font-size: 14px;
        }

        .screen {
            display: none;
            width: 100%;
            max-width: 400px;
            text-align: center;
            padding: 20px 0;
        }

        .screen.active {
            display: block;
        }

        button:active {
            transform: scale(0.98);
        }

        h2 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        p {
            font-size: 14px;
            font-weight: 400;
            margin-bottom: 16px;
            color: var(--hint);
        }

        button {
            background: var(--button);
            color: var(--button-text);
            border: none;
            padding: 12px 18px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            margin: 6px 0;
            cursor: pointer;
            width: 100%;
            max-width: 320px;
            transition: opacity 0.2s;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            font-family: 'Montserrat', sans-serif;
        }

        button:active {
            opacity: 0.8;
        }

        button.danger {
            background: var(--danger);
        }

        button.outline {
            background: transparent;
            border: 2px solid var(--button);
            color: var(--button);
        }

        input, select {
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid var(--hint);
            background: var(--secondary-bg);
            color: var(--text);
            width: 100%;
            max-width: 320px;
            margin: 8px 0;
            font-size: 14px;
            font-family: 'Montserrat', sans-serif;
        }

        label {
            display: block;
            text-align: left;
            max-width: 320px;
            margin: 12px auto 4px;
            font-size: 13px;
            font-weight: 500;
            color: var(--hint);
        }

        .timer {
            font-size: 2em;
            font-weight: bold;
            margin: 10px 0;
            word-break: break-all;
            font-variant-numeric: tabular-nums;
        }

        .habit-name {
            font-size: 1.1em;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .icon {
            font-size: 40px;
            display: block;
            margin-bottom: 10px;
        }

        .divider {
            width: 60px;
            height: 3px;
            background: var(--button);
            border-radius: 2px;
            margin: 20px auto;
        }

        small {
            display: block;
            color: var(--hint);
            font-size: 12px;
            margin: 4px 0 8px;
        }

        .habit-card {
            background: var(--secondary-bg);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
            width: 100%;
            max-width: 320px;
            position: relative;
        }

        .habit-card .timer {
            font-size: 1.8em;
        }

        .settings-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--secondary-bg);
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 8px;
            width: 100%;
            max-width: 320px;
            font-size: 14px;
        }
        
        .settings-list-item .btn-group {
            display: flex;
            gap: 8px;
        }

        .settings-list-item button {
            background: var(--button);
            color: var(--button-text);
            border: none;
            border-radius: 8px;
            padding: 6px 12px;
            font-size: 13px;
            cursor: pointer;
            width: auto;
            margin: 0;
        }
        
        .settings-list-item .del-btn {
            background: var(--danger);
        }

        .reset-btn {
            background: var(--danger);
            margin-top: 8px;
            font-size: 13px;
            padding: 10px 16px;
        }

        .achievement {
            font-size: 12px;
            margin: 4px 0;
            color: var(--hint);
        }

        .money {
            font-size: 13px;
            color: var(--success);
            margin: 4px 0;
        }

        .emoji-picker {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 8px 0;
            max-width: 320px;
        }

        .emoji-option {
            font-size: 28px;
            padding: 8px;
            border-radius: 50%;
            cursor: pointer;
            background: var(--secondary-bg);
            border: 2px solid transparent;
            transition: 0.2s;
            line-height: 1;
        }

        .emoji-option.selected {
            border-color: var(--button);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-box {
            background: var(--bg);
            color: var(--text);
            border-radius: 20px;
            padding: 24px;
            width: 90%;
            max-width: 320px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            font-size: 14px;
        }

        .modal-box p {
            margin-bottom: 20px;
            font-weight: 600;
            color: var(--text);
            font-size: 15px;
        }

        .modal-box button {
            margin: 6px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div id="confirm-modal" class="modal-overlay" style="display: none;">
        <div class="modal-box">
            <p>⚠️ Ты уверен?<br>Таймер обнулится.</p>
            <button id="confirm-yes" class="danger">Да, уверен</button>
            <button id="confirm-no" class="outline">Нет</button>
        </div>
    </div>

    <!-- ЭКРАНЫ -->
    <div id="screen-welcome" class="screen active">
        <span class="icon">🔥</span>
        <h2 id="welcome-title">Привет!</h2>
        <p>Выбери привычку, от которой хочешь отказаться:</p>
        <button id="btn-cigarettes">🚬 Сигареты</button>
        <button id="btn-vape">💨 Вейп</button>
        <div class="divider"></div>
        <button id="btn-custom" class="outline">✏️ Своя привычка</button>
        <div id="custom-block" style="display:none;">
            <input type="text" id="custom-input" placeholder="Введи свою привычку" maxlength="30">
            <button id="btn-confirm-custom">Далее</button>
        </div>
    </div>

    <div id="screen-setup" class="screen">
        <span class="icon">⚙️</span>
        <h2 id="setup-title">Добавление</h2>
        <p id="habit-label" style="display: none;"></p>
        <div id="setup-custom-block" style="display: none;">
            <label>Название привычки:</label>
            <input type="text" id="setup-name-input" placeholder="Название" maxlength="30">
            <label>Выбери иконку:</label>
            <div class="emoji-picker" id="emoji-picker"></div>
        </div>
        <label>Дата и время последнего использования:</label>
        <input type="datetime-local" id="last-use-datetime">
        <div id="cost-block">
            <label>Стоимость в день (₽):</label>
            <input type="number" id="daily-cost-input" placeholder="Сколько экономишь в день" min="0" step="0.01" value="0">
        </div>
        <div id="cigarettes-cost-fields" style="display:none;">
            <label>Сигарет в день (шт):</label>
            <input type="number" id="cig-per-day-input" placeholder="Например 10" min="0" step="1">
            <label>Стоимость одной пачки (₽):</label>
            <input type="number" id="cig-pack-cost-input" placeholder="Например 200" min="0" step="1">
        </div>
        <div id="vape-cost-fields" style="display:none;">
            <label>Сколько тратишь в месяц на вейп (₽):</label>
            <input type="number" id="vape-monthly-cost-input" placeholder="Например 2500" min="0" step="1">
        </div>
        <button id="setup-save-btn">➕ Добавить привычку</button>
        <button id="setup-back-btn" class="outline" style="border-color: var(--hint); color: var(--hint); margin-top: 10px;">← Назад</button>
    </div>

    <div id="screen-tracker" class="screen">
        <span class="icon">💪</span>
        <h2 id="tracker-title">Твои привычки</h2>
        <div id="habits-container"></div>
        <div id="total-money" class="money" style="margin-top: 12px; font-weight: 600; font-size: 15px;"></div>
        <div class="divider"></div>
        <button id="btn-open-settings" class="outline" style="border-color: var(--hint); color: var(--hint);">⚙️ Настройки</button>
    </div>

    <div id="screen-settings" class="screen">
        <span class="icon">⚙️</span>
        <h2>Настройки</h2>
        <p>Управление привычками</p>
        <button id="btn-add-from-settings">➕ Добавить привычку</button>
        <div class="divider"></div>
        <h3 style="font-size: 16px; margin-top: 10px;">Список привычек</h3>
        <div id="settings-list-container"></div>
        <div class="divider"></div>
        <button id="btn-back-to-tracker" class="outline" style="border-color: var(--hint); color: var(--hint); margin-top: 10px;">← Назад к таймерам</button>
        <button id="btn-factory-reset" class="danger" style="margin-top: 20px;">⚠️ Сбросить всё</button>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        (function() {
            console.log('🚀 Запуск трекера v9.5 (имя всегда из Telegram)');

            const tg = window.Telegram?.WebApp;
            if (tg) {
                tg.ready();
                tg.expand();
                document.documentElement.style.setProperty('--bg', tg.backgroundColor || '#ffffff');
                document.documentElement.style.setProperty('--text', tg.textColor || '#000000');
                document.documentElement.style.setProperty('--button', tg.buttonColor || '#3390ec');
                document.documentElement.style.setProperty('--button-text', tg.buttonTextColor || '#ffffff');
                document.documentElement.style.setProperty('--hint', tg.hintColor || '#999999');
                document.documentElement.style.setProperty('--secondary-bg', tg.secondaryBackgroundColor || '#f0f0f0');
            }

            const cloudAvailable = !!(tg?.CloudStorage && typeof tg.CloudStorage.getItem === 'function' && typeof tg.CloudStorage.setItem === 'function');
            console.log('CloudStorage доступен:', cloudAvailable);

            function isLocalStorageAvailable() {
                try {
                    localStorage.setItem('__test', '1');
                    localStorage.removeItem('__test');
                    return true;
                } catch(e) {
                    return false;
                }
            }
            const lsAvailable = isLocalStorageAvailable();

            async function loadData(key) {
                if (cloudAvailable) {
                    try {
                        const result = await tg.CloudStorage.getItem(key);
                        return result ?? null;
                    } catch(e) {
                        console.warn('CloudStorage load error for', key, e);
                        return lsAvailable ? localStorage.getItem(key) : null;
                    }
                } else {
                    return lsAvailable ? localStorage.getItem(key) : null;
                }
            }

            async function saveData(key, value) {
                if (cloudAvailable) {
                    try {
                        await tg.CloudStorage.setItem(key, value);
                    } catch(e) {
                        console.warn('CloudStorage save error for', key, e);
                        if (lsAvailable) localStorage.setItem(key, value);
                    }
                } else {
                    if (lsAvailable) localStorage.setItem(key, value);
                }
            }

            async function removeData(key) {
                if (cloudAvailable) {
                    try {
                        await tg.CloudStorage.removeItem(key);
                    } catch(e) {
                        console.warn('CloudStorage remove error for', key, e);
                        if (lsAvailable) localStorage.removeItem(key);
                    }
                } else {
                    if (lsAvailable) localStorage.removeItem(key);
                }
            }

            const $ = (id) => document.getElementById(id);
            const screenWelcome = $('screen-welcome');
            const screenSetup = $('screen-setup');
            const screenTracker = $('screen-tracker');
            const screenSettings = $('screen-settings');
            const welcomeTitle = $('welcome-title');
            const customBlock = $('custom-block');
            const customInput = $('custom-input');
            const setupCustomBlock = $('setup-custom-block');
            const setupNameInput = $('setup-name-input');
            const emojiPicker = $('emoji-picker');
            const habitLabel = $('habit-label');
            const lastUseDatetime = $('last-use-datetime');
            const dailyCostInput = $('daily-cost-input');
            const cigPerDayInput = $('cig-per-day-input');
            const cigPackCostInput = $('cig-pack-cost-input');
            const vapeMonthlyCostInput = $('vape-monthly-cost-input');
            const habitsContainer = $('habits-container');
            const settingsListContainer = $('settings-list-container');
            const totalMoneyEl = $('total-money');
            const confirmModal = $('confirm-modal');
            const confirmYes = $('confirm-yes');
            const confirmNo = $('confirm-no');
            const setupSaveBtn = $('setup-save-btn');
            const setupBackBtn = $('setup-back-btn');
            const btnFactoryReset = $('btn-factory-reset');

            let habits = [];
            let timerInterval = null;
            let timerElements = [];
            let userName = "Друг";
            let currentSetupHabit = null;
            let fromSettings = false;
            let editingHabitId = null;
            let pendingResetId = null;
            let selectedEmoji = '🎯';

            const defaultEmojis = ['🚬', '💨', '🍺', '🍷', '🎮', '📱', '🍔', '💊', '🎯', '🏃', '📚', '💤'];

            // ========== Экраны ==========
            function showScreen(name) {
                [screenWelcome, screenSetup, screenTracker, screenSettings].forEach(s => s.classList.remove('active'));
                switch(name) {
                    case 'welcome': screenWelcome.classList.add('active'); break;
                    case 'setup': screenSetup.classList.add('active'); break;
                    case 'tracker': screenTracker.classList.add('active'); break;
                    case 'settings': screenSettings.classList.add('active'); break;
                }
                if (tg?.BackButton) {
                    if (name === 'setup' || name === 'settings') tg.BackButton.show();
                    else tg.BackButton.hide();
                }
            }

            function goToWelcome() {
                showScreen('welcome');
                customBlock.style.display = 'none';
            }

            function goToTracker() {
                renderHabits();
                updateAllTimers();
                showScreen('tracker');
            }

            if (tg?.BackButton) {
                tg.BackButton.onClick(() => {
                    if (screenSetup.classList.contains('active')) {
                        if (fromSettings) {
                            showScreen('settings');
                            renderSettingsList();
                        } else {
                            goToWelcome();
                        }
                    } else if (screenSettings.classList.contains('active')) {
                        goToTracker();
                    }
                });
            }

            // ========== Имя пользователя (всегда из Telegram) ==========
            function resolveUserName() {
                if (tg?.initDataUnsafe?.user) {
                    userName = tg.initDataUnsafe.user.first_name || tg.initDataUnsafe.user.username || 'Друг';
                    console.log('Имя из Telegram:', userName);
                } else {
                    userName = 'Друг';
                    console.log('Нет данных Telegram, используется "Друг"');
                }
                welcomeTitle.textContent = 'Привет, ' + userName + '!';
            }

            // ========== Эмодзи пикер ==========
            function renderEmojiPicker(selected = '🎯') {
                selectedEmoji = selected;
                emojiPicker.innerHTML = '';
                defaultEmojis.forEach(emoji => {
                    const span = document.createElement('span');
                    span.className = 'emoji-option' + (emoji === selected ? ' selected' : '');
                    span.textContent = emoji;
                    span.addEventListener('click', () => {
                        selectedEmoji = emoji;
                        renderEmojiPicker(emoji);
                    });
                    emojiPicker.appendChild(span);
                });
            }

            function setDefaultDateTime() {
                const now = new Date();
                now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
                lastUseDatetime.value = now.toISOString().slice(0, 16);
            }

            function fillDateTime(timestamp) {
                const d = new Date(timestamp);
                d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
                lastUseDatetime.value = d.toISOString().slice(0, 16);
            }

            function clearSetupFields() {
                setupNameInput.value = '';
                dailyCostInput.value = '0';
                cigPerDayInput.value = '';
                cigPackCostInput.value = '';
                vapeMonthlyCostInput.value = '';
                $('cigarettes-cost-fields').style.display = 'none';
                $('vape-cost-fields').style.display = 'none';
                $('cost-block').style.display = 'block';
                habitLabel.style.display = 'none';
                setupCustomBlock.style.display = 'none';
                selectedEmoji = '🎯';
                renderEmojiPicker('🎯');
            }

            function selectHabit(type) {
                fromSettings = false;
                editingHabitId = null;
                const names = { cigarettes: 'Сигареты', vape: 'Вейп' };
                const icons = { cigarettes: '🚬', vape: '💨' };
                currentSetupHabit = { type, name: names[type] || type, icon: icons[type] || '🎯' };

                $('setup-title').textContent = 'Добавление';
                clearSetupFields();

                if (type === 'cigarettes') {
                    $('cigarettes-cost-fields').style.display = 'block';
                    $('cost-block').style.display = 'none';
                } else if (type === 'vape') {
                    $('vape-cost-fields').style.display = 'block';
                    $('cost-block').style.display = 'none';
                }

                if (type !== 'custom') {
                    habitLabel.style.display = 'block';
                    habitLabel.textContent = 'Привычка: ' + currentSetupHabit.icon + ' ' + currentSetupHabit.name;
                }
                setupSaveBtn.textContent = '➕ Добавить привычку';
                setupBackBtn.onclick = () => goToWelcome();
                showScreen('setup');
                setDefaultDateTime();
            }

            function openSetupFromSettings() {
                fromSettings = true;
                editingHabitId = null;
                currentSetupHabit = null;
                $('setup-title').textContent = 'Новая привычка';
                clearSetupFields();
                setupCustomBlock.style.display = 'block';
                $('cost-block').style.display = 'block';
                $('cigarettes-cost-fields').style.display = 'none';
                $('vape-cost-fields').style.display = 'none';
                setupSaveBtn.textContent = '➕ Добавить привычку';
                setupBackBtn.onclick = () => { showScreen('settings'); renderSettingsList(); };
                showScreen('setup');
                setDefaultDateTime();
            }

            function openEditHabit(habit) {
                fromSettings = true;
                editingHabitId = habit.id;
                currentSetupHabit = { ...habit };
                $('setup-title').textContent = 'Редактирование';
                clearSetupFields();
                setupCustomBlock.style.display = 'block';
                $('cost-block').style.display = 'block';
                $('cigarettes-cost-fields').style.display = 'none';
                $('vape-cost-fields').style.display = 'none';
                setupNameInput.value = habit.name;
                selectedEmoji = habit.icon;
                renderEmojiPicker(habit.icon);
                dailyCostInput.value = habit.costPerDay || 0;
                fillDateTime(habit.startTime);
                setupSaveBtn.textContent = '💾 Сохранить';
                setupBackBtn.onclick = () => { showScreen('settings'); renderSettingsList(); };
                showScreen('setup');
            }

            function showCustomInput() {
                customBlock.style.display = 'block';
                customInput.focus();
            }

            function confirmCustom() {
                const val = customInput.value.trim();
                if (!val) return alert('Введи название привычки');
                fromSettings = false;
                editingHabitId = null;
                currentSetupHabit = { type: 'custom', name: val, icon: '🎯' };
                $('setup-title').textContent = 'Добавление';
                clearSetupFields();
                setupCustomBlock.style.display = 'block';
                setupNameInput.value = val;
                selectedEmoji = '🎯';
                renderEmojiPicker('🎯');
                $('cost-block').style.display = 'block';
                $('cigarettes-cost-fields').style.display = 'none';
                $('vape-cost-fields').style.display = 'none';
                setupSaveBtn.textContent = '➕ Добавить привычку';
                setupBackBtn.onclick = () => goToWelcome();
                showScreen('setup');
                setDefaultDateTime();
            }

            async function saveHabitFromSetup() {
                const dtValue = lastUseDatetime.value;
                if (!dtValue) return alert('Укажи дату и время');
                let name, icon, costPerDay = 0;

                if (editingHabitId) {
                    name = setupNameInput.value.trim();
                    if (!name) return alert('Введи название');
                    icon = selectedEmoji || '🎯';
                    costPerDay = parseFloat(dailyCostInput.value) || 0;
                } else if (currentSetupHabit?.type === 'cigarettes') {
                    name = 'Сигареты';
                    icon = '🚬';
                    const perDay = parseFloat(cigPerDayInput.value) || 0;
                    const packCost = parseFloat(cigPackCostInput.value) || 0;
                    costPerDay = (perDay / 20) * packCost;
                } else if (currentSetupHabit?.type === 'vape') {
                    name = 'Вейп';
                    icon = '💨';
                    const monthly = parseFloat(vapeMonthlyCostInput.value) || 0;
                    costPerDay = monthly / 30;
                } else {
                    name = setupNameInput.value.trim();
                    if (!name) return alert('Введи название привычки');
                    icon = selectedEmoji || '🎯';
                    costPerDay = parseFloat(dailyCostInput.value) || 0;
                }

                const startTime = new Date(dtValue).getTime();
                if (isNaN(startTime)) return alert('Неверная дата/время');
                if (startTime > Date.now()) return alert('Дата не может быть в будущем!');

                const habitData = { id: editingHabitId || Date.now(), type: 'custom', name, icon, startTime, costPerDay };

                if (editingHabitId) {
                    const idx = habits.findIndex(h => h.id === editingHabitId);
                    if (idx !== -1) habits[idx] = habitData;
                } else {
                    habits.push(habitData);
                }
                await saveHabits();
                goToTracker();
            }

            function resetHabit(id) {
                pendingResetId = id;
                confirmModal.style.display = 'flex';
            }

            confirmYes.addEventListener('click', async () => {
                if (pendingResetId !== null) {
                    const habit = habits.find(h => h.id === pendingResetId);
                    if (habit) {
                        habit.startTime = Date.now();
                        await saveHabits();
                        renderHabits();
                        updateAllTimers();
                    }
                    pendingResetId = null;
                }
                confirmModal.style.display = 'none';
            });

            confirmNo.addEventListener('click', () => {
                pendingResetId = null;
                confirmModal.style.display = 'none';
            });

            async function deleteHabit(id) {
                if (!confirm('Точно удалить эту привычку?')) return;
                habits = habits.filter(h => h.id !== id);
                await saveHabits();
                renderSettingsList();
                renderHabits();
                updateAllTimers();
                if (habits.length === 0) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                }
            }

            function formatTimeDiff(ms) {
                const totalSeconds = Math.floor(ms / 1000);
                const days = Math.floor(totalSeconds / 86400);
                const hours = Math.floor((totalSeconds % 86400) / 3600);
                const minutes = Math.floor((totalSeconds % 3600) / 60);
                const seconds = totalSeconds % 60;
                return `${days}д ${hours}ч ${minutes}м ${seconds}с`;
            }

            function getAchievement(days) {
                if (days >= 365) return '🏆 Год без!';
                if (days >= 180) return '🎉 Полгода!';
                if (days >= 90) return '💪 3 месяца!';
                if (days >= 30) return '🌟 Месяц!';
                if (days >= 7) return '🔥 Неделя!';
                if (days >= 1) return '👍 1 день!';
                return '';
            }

            function renderHabits() {
                if (habits.length === 0) {
                    habitsContainer.innerHTML = '<p style="margin-top:20px; font-size:14px;">У тебя пока нет привычек. Добавь их в настройках!</p>';
                    totalMoneyEl.textContent = '';
                    timerElements = [];
                    return;
                }
                habitsContainer.innerHTML = '';
                timerElements = [];

                habits.forEach(h => {
                    const diff = Math.max(0, Date.now() - h.startTime);
                    const days = Math.floor(diff / 86400);
                    const moneySaved = (h.costPerDay || 0) * days;
                    const achievement = getAchievement(days);

                    const card = document.createElement('div');
                    card.className = 'habit-card';

                    const iconDiv = document.createElement('div');
                    iconDiv.className = 'icon';
                    iconDiv.style.fontSize = '32px';
                    iconDiv.style.marginBottom = '5px';
                    iconDiv.textContent = h.icon;

                    const nameDiv = document.createElement('div');
                    nameDiv.className = 'habit-name';
                    nameDiv.textContent = h.name;

                    const timerDiv = document.createElement('div');
                    timerDiv.className = 'timer';
                    timerDiv.dataset.id = h.id;
                    timerDiv.textContent = formatTimeDiff(diff);

                    card.appendChild(iconDiv);
                    card.appendChild(nameDiv);
                    card.appendChild(timerDiv);

                    if (moneySaved > 0) {
                        const moneyDiv = document.createElement('div');
                        moneyDiv.className = 'money';
                        moneyDiv.textContent = `💰 Сэкономлено ≈ ${Math.round(moneySaved)} ₽`;
                        card.appendChild(moneyDiv);
                    }
                    if (achievement) {
                        const achDiv = document.createElement('div');
                        achDiv.className = 'achievement';
                        achDiv.textContent = achievement;
                        card.appendChild(achDiv);
                    }

                    const resetBtn = document.createElement('button');
                    resetBtn.className = 'reset-btn';
                    resetBtn.textContent = '😞 Я сорвался';
                    resetBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        resetHabit(h.id);
                    });
                    card.appendChild(resetBtn);

                    habitsContainer.appendChild(card);
                    timerElements.push({ element: timerDiv, id: h.id });
                });
            }

            function renderSettingsList() {
                if (habits.length === 0) {
                    settingsListContainer.innerHTML = '<p style="margin-top:10px; font-size:14px;">Список пуст.</p>';
                    return;
                }
                settingsListContainer.innerHTML = '';
                habits.forEach(h => {
                    const item = document.createElement('div');
                    item.className = 'settings-list-item';
                    const span = document.createElement('span');
                    span.textContent = h.icon + ' ' + h.name;
                    const btnGroup = document.createElement('div');
                    btnGroup.className = 'btn-group';
                    const editBtn = document.createElement('button');
                    editBtn.textContent = '✏️';
                    editBtn.addEventListener('click', () => openEditHabit(h));
                    const delBtn = document.createElement('button');
                    delBtn.className = 'del-btn';
                    delBtn.textContent = 'Удалить';
                    delBtn.addEventListener('click', () => deleteHabit(h.id));
                    btnGroup.appendChild(editBtn);
                    btnGroup.appendChild(delBtn);
                    item.appendChild(span);
                    item.appendChild(btnGroup);
                    settingsListContainer.appendChild(item);
                });
            }

            function showSettings() {
                renderSettingsList();
                showScreen('settings');
            }

            function updateAllTimers() {
                let totalSavings = 0;
                timerElements.forEach(({ element, id }) => {
                    const habit = habits.find(h => h.id == id);
                    if (habit) {
                        const diff = Math.max(0, Date.now() - habit.startTime);
                        element.textContent = formatTimeDiff(diff);
                        const days = diff / 86400000;
                        totalSavings += (habit.costPerDay || 0) * days;
                    }
                });
                if (totalMoneyEl) {
                    totalMoneyEl.textContent = totalSavings > 0 ? `Общая экономия: ≈ ${Math.round(totalSavings)} ₽` : '';
                }
            }

            async function saveHabits() {
                await saveData('habitsData', JSON.stringify(habits));
            }

            async function loadHabits() {
                const data = await loadData('habitsData');
                try {
                    habits = data ? JSON.parse(data) : [];
                } catch(e) {
                    console.warn('Ошибка парсинга привычек, сброс');
                    habits = [];
                    await saveHabits();
                }
            }

            async function migrateIfNeeded() {
                if (cloudAvailable && habits.length === 0 && lsAvailable) {
                    const localData = localStorage.getItem('habitsData');
                    if (localData) {
                        try {
                            habits = JSON.parse(localData);
                            if (habits.length > 0) {
                                await saveHabits();
                                console.log('Данные мигрированы из localStorage в CloudStorage');
                            }
                        } catch(e) {}
                    }
                }
            }

            async function loadApp() {
                await loadHabits();
                await migrateIfNeeded();
                if (habits.length > 0) {
                    goToTracker();
                } else {
                    goToWelcome();
                }
            }

            // ========== Сброс до заводских настроек ==========
            async function factoryReset() {
                if (!confirm('⚠️ Ты уверен? Все привычки и прогресс будут удалены.')) return;
                await removeData('habitsData');
                habits = [];
                if (timerInterval) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                }
                timerElements = [];
                resolveUserName(); // обновим имя на всякий случай
                goToWelcome();
            }

            btnFactoryReset.addEventListener('click', factoryReset);

            // ========== Старт ==========
            async function init() {
                resolveUserName(); // устанавливает userName и обновляет заголовок
                await loadApp();

                if (timerInterval) clearInterval(timerInterval);
                timerInterval = setInterval(() => {
                    if (screenTracker.classList.contains('active')) {
                        updateAllTimers();
                    }
                }, 1000);

                window.visualViewport?.addEventListener('resize', () => {
                    document.body.style.height = window.visualViewport.height + 'px';
                });

                console.log('✅ Инициализация завершена, пользователь:', userName);
            }

            // Привязка кнопок
            document.getElementById('btn-cigarettes').addEventListener('click', () => selectHabit('cigarettes'));
            document.getElementById('btn-vape').addEventListener('click', () => selectHabit('vape'));
            document.getElementById('btn-custom').addEventListener('click', showCustomInput);
            document.getElementById('btn-confirm-custom').addEventListener('click', confirmCustom);
            setupSaveBtn.addEventListener('click', saveHabitFromSetup);
            document.getElementById('btn-open-settings').addEventListener('click', showSettings);
            document.getElementById('btn-add-from-settings').addEventListener('click', openSetupFromSettings);
            document.getElementById('btn-back-to-tracker').addEventListener('click', goToTracker);

            init();
        })();
    </script>
</body>
</html>
